<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cubs & Mariners Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #dddbd6; color: #1a1a1a; min-height: 100vh; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 1.25rem 1rem 2rem; }
  .team-tabs { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .tab { flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; opacity: 0.4; }
  .tab.cubs-tab { background: #0E3386; color: #fff; }
  .tab.mariners-tab { background: #005C5C; color: #fff; }
  .tab.active { opacity: 1; }
  .tab:hover:not(.active) { opacity: 0.7; }
  .content { display: none; }
  .content.visible { display: block; }
  .hero { border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; color: #fff; }
  .hero.cubs { background: #0E3386; }
  .hero.mariners { background: #005C5C; }
  .hero-top { display: flex; justify-content: space-between; align-items: center; }
  .hero-name { font-size: 20px; font-weight: 700; }
  .hero-sub { font-size: 13px; opacity: 0.7; margin-top: 3px; }
  .hero-record .big { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; }
  .hero-record .small { font-size: 12px; opacity: 0.7; text-align: right; margin-top: 1px; }
  .section-label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.07em; margin: 0 0 8px; }
  .game-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1.5rem; }
  .game { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; }
  .game-date { font-size: 12px; color: #888; min-width: 56px; }
  .game-opp { font-size: 14px; font-weight: 500; flex: 1; }
  .game-score { font-size: 13px; font-weight: 600; white-space: nowrap; }
  .game-score.win { color: #1a7a3f; }
  .game-score.loss { color: #c0392b; }
  .pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 20px; margin-right: 5px; }
  .pill.w { background: #d4edda; color: #155724; }
  .pill.l { background: #f8d7da; color: #721c24; }
  .series-block { background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; padding: 10px 12px; margin-bottom: 8px; }
  .series-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .series-opp { font-size: 14px; font-weight: 600; }
  .series-loc { font-size: 11px; color: #888; background: #f0f0f0; padding: 2px 7px; border-radius: 20px; }
  .series-games { display: flex; gap: 6px; flex-wrap: wrap; }
  .series-game { font-size: 12px; color: #555; background: #f7f7f7; border-radius: 6px; padding: 4px 8px; }
  .standings-card { background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 6px 14px; color: #999; font-weight: 500; font-size: 11px; border-bottom: 1px solid #f0f0f0; }
  th:not(:first-child) { text-align: right; }
  td { padding: 8px 14px; border-bottom: 1px solid #f7f7f7; color: #333; }
  td:not(:first-child) { text-align: right; }
  tr:last-child td { border-bottom: none; }
  tr.me td { font-weight: 700; background: #fafafa; }
  tr.me.cubs td:first-child { color: #0E3386; }
  tr.me.mariners td:first-child { color: #005C5C; }
  .loading { text-align: center; padding: 2rem; color: #888; font-size: 14px; }
  .error { background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #856404; margin-bottom: 1rem; }
  .updated { font-size: 11px; color: #888; text-align: center; padding-top: 1.25rem; }
</style>
</head>
<body>
<div class="wrap">
  <div class="team-tabs">
    <button class="tab cubs-tab active" onclick="switchTeam('cubs', this)">🐻 Chicago Cubs</button>
    <button class="tab mariners-tab" onclick="switchTeam('mariners', this)">🔱 Seattle Mariners</button>
  </div>
  <div id="cubs" class="content visible"><div class="loading">Loading Cubs data…</div></div>
  <div id="mariners" class="content"><div class="loading">Loading Mariners data…</div></div>
  <div class="updated" id="updated"></div>
</div>

<script>
const API_KEY = '08de9aaa-416a-4827-ad9a-cdf2245e3cb7';
const BASE    = 'https://baseball.highlightly.net';

const TEAMS = {
  cubs: {
    key: 'cubs', id: 10291191, abbr: 'CHC', name: 'Chicago Cubs',
    division: 'NL Central', leagueAbbr: 'NL',
    divisionIds: [10291191, 10291194, 10291193, 10291200, 10291186] // CHC MIL STL PIT CIN
  },
  mariners: {
    key: 'mariners', id: 10291202, abbr: 'SEA', name: 'Seattle Mariners',
    division: 'AL West', leagueAbbr: 'AL',
    divisionIds: [10291202, 10291181, 10291176, 10291199, 10291203] // SEA HOU LAA TEX OAK
  }
};

function switchTeam(team, btn) {
  document.querySelectorAll('.content').forEach(el => el.classList.remove('visible'));
  document.getElementById(team).classList.add('visible');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
}

function fmtDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('en-US', {
    weekday: 'short', month: 'numeric', day: 'numeric', timeZone: 'America/Los_Angeles'
  });
}
function fmtTime(dateStr) {
  return new Date(dateStr).toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', timeZone: 'America/Los_Angeles'
  });
}
function ordinal(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

async function apiFetch(path) {
  const res = await fetch(`${BASE}${path}`, { headers: { 'x-rapidapi-key': API_KEY } });
  if (!res.ok) {
    const body = await res.text().catch(() => '');
    throw new Error(`HTTP ${res.status} — ${path} — ${body.slice(0, 200)}`);
  }
  return res.json();
}

function getStat(stats, abbr) {
  return stats?.find(s => s.abbreviation === abbr)?.displayValue ?? '–';
}

async function loadTeam(teamKey) {
  const team = TEAMS[teamKey];
  const el   = document.getElementById(teamKey);

  try {
    const now = new Date();

    const [lastFive, upHome, upAway, standRaw] = await Promise.all([
      apiFetch(`/last-five-games?teamId=${team.id}`),
      apiFetch(`/matches?homeTeamId=${team.id}&league=MLB&limit=20`),
      apiFetch(`/matches?awayTeamId=${team.id}&league=MLB&limit=20`),
      apiFetch(`/standings?abbreviation=${team.leagueAbbr}`)
    ]);

    // ── Recent results ────────────────────────────────────
    const recentGames = (Array.isArray(lastFive) ? lastFive : (lastFive.data || [])).slice(0, 3);

    // ── Upcoming series ───────────────────────────────────
    const allUpcoming = [
      ...(upHome.data || []),
      ...(upAway.data  || [])
    ].filter(m => {
      const s = m.state?.description;
      return (s === 'Scheduled' || s === 'In Progress') && new Date(m.date) > now;
    }).sort((a, b) => new Date(a.date) - new Date(b.date));

    // Dedupe
    const seen = new Set();
    const upcoming = allUpcoming.filter(m => { if (seen.has(m.id)) return false; seen.add(m.id); return true; });

    const series = [];
    for (const g of upcoming) {
      const isHome  = g.homeTeam?.id === team.id;
      const opp     = isHome ? g.awayTeam : g.homeTeam;
      const oppName = opp?.displayName || opp?.name || '?';
      const oppAbbr = opp?.abbreviation || oppName.slice(0, 3).toUpperCase();
      const last    = series[series.length - 1];
      if (last && last.oppAbbr === oppAbbr && last.isHome === isHome) {
        last.games.push(g);
      } else {
        series.push({ oppName, oppAbbr, isHome, games: [g] });
      }
    }
    const nextTwo = series.slice(0, 2);

    // ── Standings ─────────────────────────────────────────
    // data[] = array of season objects, pick highest year
    const seasons = standRaw.data || [];
    const latest  = seasons.reduce((best, s) => (!best || s.year > best.year) ? s : best, null);
    const allTeams = latest?.data || [];

    // Filter to our division using hardcoded IDs
    const divTeams = allTeams.filter(t => team.divisionIds.includes(t.id));

    // Sort by wins desc
    const sorted = [...divTeams].sort((a, b) => {
      const wa = parseInt(getStat(a.stats, 'W')) || 0;
      const wb = parseInt(getStat(b.stats, 'W')) || 0;
      return wb - wa;
    });

    const myEntry = allTeams.find(t => t.id === team.id);
    const wins    = getStat(myEntry?.stats, 'W');
    const losses  = getStat(myEntry?.stats, 'L');
    const pct     = getStat(myEntry?.stats, 'PCT');
    const placeIdx = sorted.findIndex(t => t.id === team.id);
    const place   = placeIdx >= 0 ? ordinal(placeIdx + 1) : '–';

    // ── HTML ──────────────────────────────────────────────
    const recentHTML = recentGames.length ? recentGames.map(m => {
      const isHome   = m.homeTeam?.id === team.id;
      const opp      = isHome ? m.awayTeam : m.homeTeam;
      const oppAbbr  = opp?.abbreviation || '?';
      const parts    = (m.state?.score?.current || '').split('-').map(s => s.trim());
      const myScore  = isHome ? (parts[0] ?? '?') : (parts[1] ?? '?');
      const oppScore = isHome ? (parts[1] ?? '?') : (parts[0] ?? '?');
      const won      = parseInt(myScore) > parseInt(oppScore);
      return `
        <div class="game">
          <div class="game-date">${fmtDate(m.date)}</div>
          <div class="game-opp">${isHome ? 'vs' : '@'} ${oppAbbr}</div>
          <div class="game-score ${won ? 'win' : 'loss'}">
            <span class="pill ${won ? 'w' : 'l'}">${won ? 'W' : 'L'}</span>${myScore}–${oppScore}
          </div>
        </div>`;
    }).join('')
    : `<div class="game"><div class="game-opp" style="color:#999">No recent results found</div></div>`;

    const seriesHTML = nextTwo.length ? nextTwo.map(s => `
      <div class="series-block">
        <div class="series-header">
          <div class="series-opp">${s.isHome ? 'vs' : '@'} ${s.oppName}</div>
          <div class="series-loc">${s.isHome ? 'Home' : 'Away'}</div>
        </div>
        <div class="series-games">
          ${s.games.map(g => `<div class="series-game">${fmtDate(g.date)} · ${fmtTime(g.date)}</div>`).join('')}
        </div>
      </div>`).join('')
    : `<div class="series-block"><div class="series-opp" style="color:#999">No upcoming games found</div></div>`;

    const standHTML = sorted.length ? sorted.map(t => {
      const w  = getStat(t.stats, 'W');
      const l  = getStat(t.stats, 'L');
      const p  = getStat(t.stats, 'PCT');
      const gb = getStat(t.stats, 'GB');
      const isMe = t.id === team.id;
      return `
        <tr class="${isMe ? 'me ' + teamKey : ''}">
          <td>${t.name}</td><td>${w}</td><td>${l}</td><td>${p}</td>
          <td>${gb === '-' || gb === '0' ? '—' : gb}</td>
        </tr>`;
    }).join('')
    : `<tr><td colspan="5" style="color:#999;padding:12px 14px">Standings unavailable</td></tr>`;

    el.innerHTML = `
      <div class="hero ${teamKey}">
        <div class="hero-top">
          <div>
            <div class="hero-name">${team.name}</div>
            <div class="hero-sub">${team.division} · ${place} place</div>
          </div>
          <div class="hero-record">
            <div class="big">${wins}–${losses}</div>
            <div class="small">${pct} win%</div>
          </div>
        </div>
      </div>
      <div class="section-label">Recent results</div>
      <div class="game-list">${recentHTML}</div>
      <div class="section-label">Upcoming series</div>
      ${seriesHTML}
      <div style="margin-bottom:1.5rem"></div>
      <div class="section-label">${team.division} standings</div>
      <div class="standings-card">
        <table>
          <thead><tr><th>Team</th><th>W</th><th>L</th><th>PCT</th><th>GB</th></tr></thead>
          <tbody>${standHTML}</tbody>
        </table>
      </div>`;

  } catch(err) {
    el.innerHTML = `
      <div class="error">
        ⚠️ Couldn't load data. Try refreshing the page.
        <br><small style="opacity:0.7;margin-top:4px;display:block">${err.message}</small>
      </div>`;
  }
}

Promise.all([loadTeam('cubs'), loadTeam('mariners')]).then(() => {
  document.getElementById('updated').textContent = 'Updated ' +
    new Date().toLocaleString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric',
      hour: 'numeric', minute: '2-digit', timeZone: 'America/Los_Angeles'
    });
});
</script>
</body>
</html>
