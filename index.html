<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cubs Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #dddbd6; color: #1a1a1a; min-height: 100vh; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 1.25rem 1rem 2rem; }

  .hero { border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; background: #0E3386; color: #fff; }
  .hero-top { display: flex; justify-content: space-between; align-items: center; }
  .hero-name { font-size: 22px; font-weight: 700; }
  .hero-sub { font-size: 13px; opacity: 0.7; margin-top: 3px; }
  .hero-record .big { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
  .hero-record .small { font-size: 12px; opacity: 0.7; text-align: right; margin-top: 1px; }

  .section-label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.07em; margin: 0 0 8px; }

  .game-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1.5rem; }
  .game { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; }
  .game-date { font-size: 12px; color: #888; min-width: 60px; }
  .game-opp { font-size: 14px; font-weight: 500; flex: 1; }
  .game-score { font-size: 13px; font-weight: 600; white-space: nowrap; }
  .game-score.win { color: #1a7a3f; }
  .game-score.loss { color: #c0392b; }
  .game-score.upcoming { color: #888; font-weight: 400; font-size: 12px; }
  .pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 20px; margin-right: 5px; }
  .pill.w { background: #d4edda; color: #155724; }
  .pill.l { background: #f8d7da; color: #721c24; }
  .inprogress { background: #fff3cd; color: #856404; }

  .series-block { background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; padding: 10px 12px; margin-bottom: 8px; }
  .series-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .series-opp { font-size: 14px; font-weight: 600; }
  .series-loc { font-size: 11px; color: #888; background: #f0f0f0; padding: 2px 7px; border-radius: 20px; }
  .series-games { display: flex; gap: 6px; flex-wrap: wrap; }
  .series-game { font-size: 12px; color: #555; background: #f7f7f7; border-radius: 6px; padding: 4px 8px; }

  .standings-card { background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 6px 14px; color: #999; font-weight: 500; font-size: 11px; border-bottom: 1px solid #f0f0f0; }
  th:not(:first-child) { text-align: right; }
  td { padding: 8px 14px; border-bottom: 1px solid #f7f7f7; color: #333; }
  td:not(:first-child) { text-align: right; }
  tr:last-child td { border-bottom: none; }
  tr.me td { font-weight: 700; background: #f0f4ff; }
  tr.me td:first-child { color: #0E3386; }

  .loading { text-align: center; padding: 3rem 1rem; color: #888; font-size: 14px; }
  .error { background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #856404; margin-bottom: 1rem; }
  .updated { font-size: 11px; color: #888; text-align: center; padding-top: 1.25rem; }
</style>
</head>
<body>
<div class="wrap">
  <div id="main"><div class="loading">Loading Cubs data…</div></div>
  <div class="updated" id="updated"></div>
</div>

<script>
const TEAM_ID    = 112;
const TEAM_NAME  = 'Chicago Cubs';
const DIV_ID     = 205; // NL Central
const BASE       = 'https://statsapi.mlb.com/api/v1';

function fmtDate(dateStr) {
  // dateStr is YYYY-MM-DD
  const [y, m, d] = dateStr.split('-');
  const dt = new Date(+y, +m - 1, +d);
  return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'numeric', day: 'numeric' });
}

function fmtTime(isoStr) {
  return new Date(isoStr).toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', timeZone: 'America/Chicago'
  });
}

function ordinal(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

function dateStr(d) {
  return d.toISOString().split('T')[0];
}

async function load() {
  const main = document.getElementById('main');
  try {
    const today = new Date();
    const past  = new Date(today); past.setDate(today.getDate() - 10);
    const future = new Date(today); future.setDate(today.getDate() + 28);
    const season = today.getFullYear();

    const [schedData, standData] = await Promise.all([
      fetch(`${BASE}/schedule?sportId=1&teamId=${TEAM_ID}&startDate=${dateStr(past)}&endDate=${dateStr(future)}&hydrate=linescore,decisions&gameType=R`).then(r => r.json()),
      fetch(`${BASE}/standings?leagueId=104&season=${season}&standingsTypes=regularSeason&hydrate=team(division)&fields=records,teamRecords,team,name,division,id,abbreviation,divisionRank,gamesBack,winningPercentage,wins,losses`).then(r => r.json())
    ]);

    // ── Parse schedule ────────────────────────────────────
    const allGames = [];
    for (const date of (schedData.dates || [])) {
      for (const game of (date.games || [])) {
        allGames.push({ date: date.date, ...game });
      }
    }

    const finished = allGames.filter(g =>
      g.status?.abstractGameState === 'Final' || g.status?.detailedState === 'Game Over'
    ).sort((a, b) => new Date(b.gameDate) - new Date(a.gameDate));

    const inProgress = allGames.filter(g =>
      g.status?.abstractGameState === 'Live'
    );

    const scheduled = allGames.filter(g =>
      g.status?.abstractGameState === 'Preview'
    ).sort((a, b) => new Date(a.gameDate) - new Date(b.gameDate));

    // Recent: last 3 finished
    const recent = finished.slice(0, 3);

    // Group upcoming into series
    const series = [];
    for (const g of scheduled) {
      const isHome   = g.teams?.home?.team?.id === TEAM_ID;
      const oppTeam  = isHome ? g.teams?.away?.team : g.teams?.home?.team;
      const oppName  = oppTeam?.name || '?';
      const last     = series[series.length - 1];
      if (last && last.oppName === oppName && last.isHome === isHome) {
        last.games.push(g);
      } else {
        series.push({ oppName, isHome, games: [g] });
      }
    }
    const nextTwo = series.slice(0, 2);

    // ── Parse standings ───────────────────────────────────
    let myRecord = null;
    let divTeams = [];

    for (const record of (standData.records || [])) {
      for (const tr of (record.teamRecords || [])) {
        if (tr.team?.division?.id === DIV_ID) {
          divTeams.push(tr);
          if (tr.team?.id === TEAM_ID) myRecord = tr;
        }
      }
    }

    // Sort by divisionRank
    divTeams.sort((a, b) => parseInt(a.divisionRank) - parseInt(b.divisionRank));

    const wins   = myRecord?.wins   ?? '–';
    const losses = myRecord?.losses ?? '–';
    const pct    = myRecord?.winningPercentage ?? '–';
    const place  = myRecord?.divisionRank ? ordinal(parseInt(myRecord.divisionRank)) : '–';

    // ── In-progress game ──────────────────────────────────
    let inProgressHTML = '';
    if (inProgress.length > 0) {
      const g = inProgress[0];
      const isHome  = g.teams?.home?.team?.id === TEAM_ID;
      const opp     = isHome ? g.teams?.away?.team?.name : g.teams?.home?.team?.name;
      const myScore = isHome ? (g.teams?.home?.score ?? 0) : (g.teams?.away?.score ?? 0);
      const opScore = isHome ? (g.teams?.away?.score ?? 0) : (g.teams?.home?.score ?? 0);
      const inning  = g.linescore?.currentInningOrdinal || '';
      const state   = g.linescore?.inningState || '';
      inProgressHTML = `
        <div class="section-label">Live</div>
        <div class="game-list" style="margin-bottom:1.5rem">
          <div class="game inprogress">
            <div class="game-date" style="color:#856404">${state} ${inning}</div>
            <div class="game-opp">${isHome ? 'vs' : '@'} ${opp}</div>
            <div class="game-score" style="color:#856404;font-weight:700">${myScore}–${opScore}</div>
          </div>
        </div>`;
    }

    // ── Recent results HTML ───────────────────────────────
    const recentHTML = recent.length ? recent.map(g => {
      const isHome  = g.teams?.home?.team?.id === TEAM_ID;
      const opp     = isHome ? g.teams?.away?.team : g.teams?.home?.team;
      const oppAbbr = opp?.abbreviation || opp?.name || '?';
      const myScore = isHome ? g.teams?.home?.score : g.teams?.away?.score;
      const opScore = isHome ? g.teams?.away?.score : g.teams?.home?.score;
      const won     = isHome ? g.teams?.home?.isWinner : g.teams?.away?.isWinner;
      return `
        <div class="game">
          <div class="game-date">${fmtDate(g.date)}</div>
          <div class="game-opp">${isHome ? 'vs' : '@'} ${oppAbbr}</div>
          <div class="game-score ${won ? 'win' : 'loss'}">
            <span class="pill ${won ? 'w' : 'l'}">${won ? 'W' : 'L'}</span>${myScore}–${opScore}
          </div>
        </div>`;
    }).join('')
    : `<div class="game"><div class="game-opp" style="color:#999">No recent results found</div></div>`;

    // ── Upcoming series HTML ──────────────────────────────
    const seriesHTML = nextTwo.length ? nextTwo.map(s => `
      <div class="series-block">
        <div class="series-header">
          <div class="series-opp">${s.isHome ? 'vs' : '@'} ${s.oppName}</div>
          <div class="series-loc">${s.isHome ? 'Home' : 'Away'}</div>
        </div>
        <div class="series-games">
          ${s.games.map(g => `<div class="series-game">${fmtDate(g.date)} · ${fmtTime(g.gameDate)}</div>`).join('')}
        </div>
      </div>`).join('')
    : `<div class="series-block"><div class="series-opp" style="color:#999">No upcoming games found</div></div>`;

    // ── Standings HTML ────────────────────────────────────
    const standHTML = divTeams.length ? divTeams.map(tr => {
      const isMe = tr.team?.id === TEAM_ID;
      const gb   = tr.gamesBack === '-' || tr.gamesBack === '0' ? '—' : tr.gamesBack;
      return `
        <tr class="${isMe ? 'me' : ''}">
          <td>${tr.team?.name || '?'}</td>
          <td>${tr.wins}</td>
          <td>${tr.losses}</td>
          <td>${tr.winningPercentage}</td>
          <td>${gb}</td>
        </tr>`;
    }).join('')
    : `<tr><td colspan="5" style="color:#999;padding:12px 14px">Standings unavailable</td></tr>`;

    // ── Render ────────────────────────────────────────────
    main.innerHTML = `
      <div class="hero">
        <div class="hero-top">
          <div>
            <div class="hero-name">🐻 Chicago Cubs</div>
            <div class="hero-sub">NL Central · ${place} place</div>
          </div>
          <div class="hero-record">
            <div class="big">${wins}–${losses}</div>
            <div class="small">${pct} win%</div>
          </div>
        </div>
      </div>

      ${inProgressHTML}

      <div class="section-label">Recent results</div>
      <div class="game-list">${recentHTML}</div>

      <div class="section-label">Upcoming series</div>
      ${seriesHTML}
      <div style="margin-bottom:1.5rem"></div>

      <div class="section-label">NL Central standings</div>
      <div class="standings-card">
        <table>
          <thead><tr><th>Team</th><th>W</th><th>L</th><th>PCT</th><th>GB</th></tr></thead>
          <tbody>${standHTML}</tbody>
        </table>
      </div>`;

    document.getElementById('updated').textContent = 'Updated ' +
      new Date().toLocaleString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit', timeZone: 'America/Chicago'
      });

  } catch(err) {
    main.innerHTML = `
      <div class="error">
        ⚠️ Couldn't load data. Try refreshing the page.
        <br><small style="opacity:0.7;margin-top:4px;display:block">${err.message}</small>
      </div>`;
  }
}

load();
</script>
</body>
</html>
